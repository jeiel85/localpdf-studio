name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test frontend
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Check Rust backend
        run: cargo check
        working-directory: src-tauri

      - name: Test Rust backend
        run: cargo test
        working-directory: src-tauri

      - name: Validate winget manifests
        shell: pwsh
        run: ./scripts/windows/validate-winget-manifests.ps1

      - name: Build Chocolatey package
        shell: pwsh
        run: ./scripts/windows/publish-chocolatey.ps1 -SkipPush
