name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            rust-targets: ''
          - platform: 'windows-latest'
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Ubuntu system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LocalPDF Studio ${{ github.ref_name }}'
          releaseBody: |
            See CHANGELOG.md for release notes.

            ## Downloads

            - **Windows**: NSIS installer (.exe), MSI installer, Portable ZIP
            - **macOS**: Universal DMG (Apple Silicon + Intel). ⚠️ Unsigned — see INSTALL.md
            - **Linux**: AppImage, .deb, .rpm

            Verify checksums before installing.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Create portable ZIP (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: ./scripts/windows/create-portable-zip.ps1

      - name: Upload portable ZIP to release (Windows)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist-release/LocalPDF-Studio-Portable.zip
          draft: true
          fail_on_unmatched_files: false

      - name: Verify release assets
        shell: bash
        run: |
          echo "Release assets summary for ${{ matrix.platform }}:"
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            echo "- NSIS installer (.exe) + .sig"
            echo "- MSI installer (ko-KR + en-US)"
            echo "- Portable ZIP"
            echo "- latest.json (Updater manifest)"
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            echo "- Universal DMG (aarch64 + x86_64)"
            echo "- .app bundle"
            echo "- Unsigned — users must override Gatekeeper (see INSTALL.md)"
          else
            echo "- AppImage"
            echo "- .deb (Debian/Ubuntu)"
            echo "- .rpm (Fedora/RHEL)"
          fi
